<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken House Pro</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f7f7f7;
}

header{
background:#d32f2f;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:15px;
max-width:600px;
margin:auto;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

button{
padding:10px;
cursor:pointer;
background:#d32f2f;
color:white;
border:none;
border-radius:5px;
}

button:hover{
background:#b71c1c;
}

.cart{
background:#222;
color:white;
padding:15px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:10px;
margin:5px 0;
border:1px solid #ccc;
border-radius:5px;
}
</style>
</head>

<body>

<header>
<h1>🐔 Chicken House PRO</h1>
<p>Fresh • Fast • Delicious</p>
</header>

<div class="container">

<!-- PRODUCTS -->
<div class="card">
<h3>Grilled Chicken - $5</h3>
<button onclick="addItem('Grilled Chicken',5)">Add</button>
</div>

<div class="card">
<h3>Fried Chicken - $4</h3>
<button onclick="addItem('Fried Chicken',4)">Add</button>
</div>

<div class="card">
<h3>Chicken Burger - $3</h3>
<button onclick="addItem('Chicken Burger',3)">Add</button>
</div>

<!-- CHECKOUT -->
<div class="card">
<h3>Checkout</h3>
<input id="name" placeholder="Your Name">
<textarea id="address" placeholder="Your Address"></textarea>
<input id="phone" placeholder="Phone Number">
</div>

<!-- CART -->
<div class="cart">
<h3>Cart</h3>
<ul id="cart"></ul>
<p><b>Total: $<span id="total">0</span></b></p>

<button onclick="orderNow()">📱 Place Order</button>
</div>

</div>

<script>

let cart = [];
let total = 0;

function addItem(name, price){
cart.push(name + " - $" + price);
total += price;

document.getElementById("cart").innerHTML =
cart.map(i => "<li>" + i + "</li>").join("");

document.getElementById("total").innerText = total;
}

function orderNow(){

let shopNumber = "88017XXXXXXX"; // 👉 তোমার নাম্বার দাও

let name = document.getElementById("name").value;
let address = document.getElementById("address").value;
let phone = document.getElementById("phone").value;

if(!name || !address || !phone){
alert("Please fill all fields");
return;
}

if(cart.length === 0){
alert("Cart is empty");
return;
}

let msg =
"🐔 *CHICKEN HOUSE ORDER*\n\n" +
"Name: " + name + "\n" +
"Phone: " + phone + "\n" +
"Address: " + address + "\n\n" +
"Items:\n" + cart.join("\n") + "\n\n" +
"Total: $" + total + "\n\n" +
"Thank you for your order ❤️";

let url = "https://wa.me/" + shopNumber + "?text=" + encodeURIComponent(msg);

window.open(url, "_blank");
}

</script>

</body>
</html>
